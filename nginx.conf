server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/dev/store/military-grade {
        proxy_pass https://dev.yieldboostai.xyz/api/dev/store/military-grade;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name dev.yieldboostai.xyz;
        proxy_set_header Host dev.yieldboostai.xyz;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }

    location /api/v1/ {
        proxy_pass https://api.yieldboostai.xyz/v1/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name api.yieldboostai.xyz;
        proxy_set_header Host api.yieldboostai.xyz;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
